<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>表情包大乱斗 - Emoji Fighter</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            overflow: hidden;
            user-select: none;
        }

        #gameCanvas {
            display: block;
            margin: 0 auto;
            background: linear-gradient(to bottom, #87CEEB 0%, #E0F6FF 50%, #90EE90 100%);
            border: 5px solid #333;
            box-shadow: 0 10px 50px rgba(0,0,0,0.5);
        }

        #ui {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            pointer-events: none;
        }

        .player-info {
            background: rgba(0,0,0,0.7);
            padding: 15px;
            border-radius: 10px;
            color: white;
            min-width: 300px;
        }

        .player-name {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .health-bar {
            width: 100%;
            height: 30px;
            background: #333;
            border-radius: 15px;
            overflow: hidden;
            border: 3px solid #fff;
            position: relative;
        }

        .health-fill {
            height: 100%;
            background: linear-gradient(to right, #ff0000, #ff6b6b);
            transition: width 0.3s ease;
            box-shadow: inset 0 2px 10px rgba(255,255,255,0.3);
        }

        .health-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-weight: bold;
            font-size: 16px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
        }

        .special-bar {
            width: 100%;
            height: 15px;
            background: #333;
            border-radius: 10px;
            overflow: hidden;
            border: 2px solid #fff;
            margin-top: 5px;
        }

        .special-fill {
            height: 100%;
            background: linear-gradient(to right, #ffd700, #ffed4e);
            transition: width 0.3s ease;
            box-shadow: inset 0 2px 5px rgba(255,255,255,0.5);
        }

        #controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            padding: 15px 30px;
            border-radius: 15px;
            color: white;
            text-align: center;
            pointer-events: none;
        }

        .control-row {
            margin: 5px 0;
            font-size: 14px;
        }

        #gameOver {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.9);
            padding: 40px 60px;
            border-radius: 20px;
            color: white;
            text-align: center;
            display: none;
            pointer-events: all;
        }

        #gameOver h1 {
            font-size: 48px;
            margin-bottom: 20px;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.5);
        }

        #gameOver button {
            font-size: 24px;
            padding: 15px 40px;
            margin: 10px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            cursor: pointer;
            transition: transform 0.2s;
        }

        #gameOver button:hover {
            transform: scale(1.1);
        }

        .combo-text {
            position: absolute;
            font-size: 36px;
            font-weight: bold;
            color: #ff6b6b;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.8);
            pointer-events: none;
            animation: comboFloat 1s ease-out forwards;
        }

        @keyframes comboFloat {
            0% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
            100% {
                opacity: 0;
                transform: translateY(-100px) scale(1.5);
            }
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas" width="1200" height="600"></canvas>

    <div id="ui">
        <div class="player-info">
            <div class="player-name">😎 玩家1</div>
            <div class="health-bar">
                <div class="health-fill" id="p1Health" style="width: 100%"></div>
                <div class="health-text" id="p1HealthText">100/100</div>
            </div>
            <div class="special-bar">
                <div class="special-fill" id="p1Special" style="width: 0%"></div>
            </div>
        </div>

        <div class="player-info">
            <div class="player-name">🤡 玩家2</div>
            <div class="health-bar">
                <div class="health-fill" id="p2Health" style="width: 100%"></div>
                <div class="health-text" id="p2HealthText">100/100</div>
            </div>
            <div class="special-bar">
                <div class="special-fill" id="p2Special" style="width: 0%"></div>
            </div>
        </div>
    </div>

    <div id="controls">
        <div class="control-row"><strong>玩家1:</strong> WASD移动 | J攻击 | K重击 | L必杀技</div>
        <div class="control-row"><strong>玩家2:</strong> 方向键移动 | 1攻击 | 2重击 | 3必杀技</div>
    </div>

    <div id="gameOver">
        <h1 id="winnerText"></h1>
        <button onclick="restartGame()">再来一局</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // 游戏状态
        let gameRunning = true;
        let particles = [];
        let projectiles = [];
        let comboCounter = 0;
        let lastHitTime = 0;

        // 玩家类
        class Player {
            constructor(x, emoji, controls, id) {
                this.x = x;
                this.y = 400;
                this.width = 60;
                this.height = 80;
                this.velocityX = 0;
                this.velocityY = 0;
                this.speed = 5;
                this.jumpPower = 15;
                this.gravity = 0.6;
                this.onGround = false;
                this.health = 100;
                this.maxHealth = 100;
                this.special = 0;
                this.maxSpecial = 100;
                this.emoji = emoji;
                this.controls = controls;
                this.id = id;
                this.facing = id === 1 ? 1 : -1;
                this.attacking = false;
                this.attackCooldown = 0;
                this.heavyAttacking = false;
                this.specialAttacking = false;
                this.stunned = false;
                this.stunTime = 0;
                this.invincible = false;
                this.invincibleTime = 0;
                this.animationFrame = 0;
                this.animationTimer = 0;
            }

            update() {
                if (this.stunned) {
                    this.stunTime--;
                    if (this.stunTime <= 0) {
                        this.stunned = false;
                    }
                    this.emoji = '😵';
                } else {
                    this.handleInput();
                }

                if (this.invincible) {
                    this.invincibleTime--;
                    if (this.invincibleTime <= 0) {
                        this.invincible = false;
                    }
                }

                // 物理更新
                this.velocityY += this.gravity;
                this.x += this.velocityX;
                this.y += this.velocityY;

                // 地面碰撞
                if (this.y >= 400) {
                    this.y = 400;
                    this.velocityY = 0;
                    this.onGround = true;
                } else {
                    this.onGround = false;
                }

                // 边界限制
                if (this.x < 0) this.x = 0;
                if (this.x > canvas.width - this.width) this.x = canvas.width - this.width;

                // 摩擦力
                this.velocityX *= 0.85;

                // 攻击冷却
                if (this.attackCooldown > 0) this.attackCooldown--;
                if (this.attacking && this.attackCooldown === 0) this.attacking = false;
                if (this.heavyAttacking && this.attackCooldown === 0) this.heavyAttacking = false;
                if (this.specialAttacking && this.attackCooldown === 0) this.specialAttacking = false;

                // 动画
                this.animationTimer++;
                if (this.animationTimer > 10) {
                    this.animationFrame = (this.animationFrame + 1) % 2;
                    this.animationTimer = 0;
                }
            }

            handleInput() {
                const keys = this.controls;

                // 移动
                if (keysPressed[keys.left]) {
                    this.velocityX = -this.speed;
                    this.facing = -1;
                    if (this.onGround && !this.attacking) this.emoji = '🏃';
                }
                if (keysPressed[keys.right]) {
                    this.velocityX = this.speed;
                    this.facing = 1;
                    if (this.onGround && !this.attacking) this.emoji = '🏃';
                }

                // 跳跃
                if (keysPressed[keys.up] && this.onGround) {
                    this.velocityY = -this.jumpPower;
                    this.emoji = '🤸';
                    createParticles(this.x + this.width/2, this.y + this.height, '💨', 5);
                }

                // 攻击
                if (keysPressed[keys.attack] && this.attackCooldown === 0) {
                    this.attack();
                }
                if (keysPressed[keys.heavy] && this.attackCooldown === 0) {
                    this.heavyAttack();
                }
                if (keysPressed[keys.special] && this.special >= 100 && this.attackCooldown === 0) {
                    this.specialAttack();
                }

                // 默认表情
                if (Math.abs(this.velocityX) < 0.5 && this.onGround && !this.attacking && !this.stunned) {
                    this.emoji = this.id === 1 ? '😎' : '🤡';
                }
            }

            attack() {
                this.attacking = true;
                this.attackCooldown = 20;
                this.emoji = '😠';

                const opponent = this.id === 1 ? player2 : player1;
                const distance = Math.abs(this.x - opponent.x);

                if (distance < 100 && Math.abs(this.y - opponent.y) < 50) {
                    opponent.takeDamage(8, this);
                    createParticles(opponent.x + opponent.width/2, opponent.y + opponent.height/2, '💥', 8);
                    this.special = Math.min(this.special + 10, this.maxSpecial);
                }
            }

            heavyAttack() {
                this.heavyAttacking = true;
                this.attackCooldown = 40;
                this.emoji = '😡';

                const opponent = this.id === 1 ? player2 : player1;
                const distance = Math.abs(this.x - opponent.x);

                if (distance < 120 && Math.abs(this.y - opponent.y) < 50) {
                    opponent.takeDamage(15, this);
                    opponent.velocityX = this.facing * 10;
                    opponent.velocityY = -5;
                    opponent.stunned = true;
                    opponent.stunTime = 20;
                    createParticles(opponent.x + opponent.width/2, opponent.y + opponent.height/2, '💢', 15);
                    this.special = Math.min(this.special + 20, this.maxSpecial);
                }
            }

            specialAttack() {
                this.specialAttacking = true;
                this.attackCooldown = 60;
                this.special = 0;
                this.emoji = '🤩';

                // 发射三个搞笑弹幕
                const emojis = ['💩', '🍌', '🧀'];
                for (let i = 0; i < 3; i++) {
                    setTimeout(() => {
                        projectiles.push({
                            x: this.x + this.width/2,
                            y: this.y + this.height/2 - 20,
                            velocityX: this.facing * 8,
                            velocityY: -3 + i * 2,
                            emoji: emojis[i],
                            owner: this.id,
                            damage: 12
                        });
                    }, i * 100);
                }

                createParticles(this.x + this.width/2, this.y + this.height/2, '✨', 20);
            }

            takeDamage(damage, attacker) {
                if (this.invincible) return;

                this.health = Math.max(0, this.health - damage);
                this.invincible = true;
                this.invincibleTime = 10;

                // 连击系统
                const now = Date.now();
                if (now - lastHitTime < 2000) {
                    comboCounter++;
                    if (comboCounter > 1) {
                        showCombo(comboCounter);
                    }
                } else {
                    comboCounter = 1;
                }
                lastHitTime = now;

                if (this.health <= 0) {
                    endGame(attacker.id);
                }

                updateHealthBar(this.id);
            }

            draw() {
                ctx.save();

                // 无敌闪烁效果
                if (this.invincible && Math.floor(this.invincibleTime / 3) % 2 === 0) {
                    ctx.globalAlpha = 0.5;
                }

                // 绘制阴影
                ctx.fillStyle = 'rgba(0,0,0,0.3)';
                ctx.beginPath();
                ctx.ellipse(this.x + this.width/2, this.y + this.height + 5, this.width/2, 10, 0, 0, Math.PI * 2);
                ctx.fill();

                // 绘制角色
                ctx.font = `${this.height}px Arial`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'bottom';

                // 攻击动画
                let offsetX = 0;
                let offsetY = 0;
                if (this.attacking || this.heavyAttacking) {
                    offsetX = this.facing * 10;
                }
                if (this.specialAttacking) {
                    offsetY = Math.sin(Date.now() / 100) * 10;
                }

                ctx.fillText(this.emoji, this.x + this.width/2 + offsetX, this.y + this.height + offsetY);

                // 方向指示
                if (Math.abs(this.velocityX) > 0.5) {
                    ctx.save();
                    if (this.facing === -1) {
                        ctx.scale(-1, 1);
                        ctx.fillText(this.emoji, -(this.x + this.width/2 + offsetX), this.y + this.height + offsetY);
                    }
                    ctx.restore();
                }

                ctx.restore();
            }
        }

        // 粒子效果
        function createParticles(x, y, emoji, count) {
            for (let i = 0; i < count; i++) {
                particles.push({
                    x: x,
                    y: y,
                    velocityX: (Math.random() - 0.5) * 8,
                    velocityY: (Math.random() - 0.5) * 8 - 2,
                    emoji: emoji,
                    life: 60,
                    rotation: Math.random() * Math.PI * 2,
                    rotationSpeed: (Math.random() - 0.5) * 0.3
                });
            }
        }

        function updateParticles() {
            particles = particles.filter(p => {
                p.x += p.velocityX;
                p.y += p.velocityY;
                p.velocityY += 0.3;
                p.rotation += p.rotationSpeed;
                p.life--;

                ctx.save();
                ctx.globalAlpha = p.life / 60;
                ctx.translate(p.x, p.y);
                ctx.rotate(p.rotation);
                ctx.font = '24px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(p.emoji, 0, 0);
                ctx.restore();

                return p.life > 0;
            });
        }

        function updateProjectiles() {
            projectiles = projectiles.filter(p => {
                p.x += p.velocityX;
                p.y += p.velocityY;
                p.velocityY += 0.2;

                // 碰撞检测
                const opponent = p.owner === 1 ? player2 : player1;
                if (Math.abs(p.x - (opponent.x + opponent.width/2)) < 40 &&
                    Math.abs(p.y - (opponent.y + opponent.height/2)) < 40) {
                    opponent.takeDamage(p.damage, p.owner === 1 ? player1 : player2);
                    createParticles(p.x, p.y, '💥', 10);
                    return false;
                }

                // 绘制
                ctx.font = '32px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(p.emoji, p.x, p.y);

                return p.x > 0 && p.x < canvas.width && p.y < canvas.height;
            });
        }

        function showCombo(combo) {
            const comboText = document.createElement('div');
            comboText.className = 'combo-text';
            comboText.textContent = `${combo} COMBO!`;
            comboText.style.left = canvas.width / 2 + 'px';
            comboText.style.top = '200px';
            document.body.appendChild(comboText);

            setTimeout(() => comboText.remove(), 1000);
        }

        function updateHealthBar(playerId) {
            const player = playerId === 1 ? player1 : player2;
            const healthFill = document.getElementById(`p${playerId}Health`);
            const healthText = document.getElementById(`p${playerId}HealthText`);
            const specialFill = document.getElementById(`p${playerId}Special`);

            const healthPercent = (player.health / player.maxHealth) * 100;
            healthFill.style.width = healthPercent + '%';
            healthText.textContent = `${Math.ceil(player.health)}/${player.maxHealth}`;

            const specialPercent = (player.special / player.maxSpecial) * 100;
            specialFill.style.width = specialPercent + '%';
        }

        function endGame(winnerId) {
            gameRunning = false;
            const gameOver = document.getElementById('gameOver');
            const winnerText = document.getElementById('winnerText');
            winnerText.textContent = `${winnerId === 1 ? '😎 玩家1' : '🤡 玩家2'} 获胜！`;
            gameOver.style.display = 'block';
        }

        function restartGame() {
            location.reload();
        }

        // 键盘控制
        const keysPressed = {};

        window.addEventListener('keydown', (e) => {
            keysPressed[e.key.toLowerCase()] = true;
        });

        window.addEventListener('keyup', (e) => {
            keysPressed[e.key.toLowerCase()] = false;
        });

        // 初始化玩家
        const player1 = new Player(200, '😎', {
            left: 'a',
            right: 'd',
            up: 'w',
            down: 's',
            attack: 'j',
            heavy: 'k',
            special: 'l'
        }, 1);

        const player2 = new Player(900, '🤡', {
            left: 'arrowleft',
            right: 'arrowright',
            up: 'arrowup',
            down: 'arrowdown',
            attack: '1',
            heavy: '2',
            special: '3'
        }, 2);

        // 绘制背景
        function drawBackground() {
            // 云朵
            ctx.font = '48px Arial';
            ctx.fillText('☁️', 150 + Math.sin(Date.now() / 1000) * 20, 100);
            ctx.fillText('☁️', 600 + Math.cos(Date.now() / 1500) * 30, 80);
            ctx.fillText('☁️', 950 + Math.sin(Date.now() / 1200) * 25, 120);

            // 地面装饰
            ctx.fillStyle = '#8B4513';
            ctx.fillRect(0, 480, canvas.width, 120);

            ctx.fillStyle = '#228B22';
            for (let i = 0; i < canvas.width; i += 100) {
                ctx.fillText('🌱', i + 20, 490);
                ctx.fillText('🌿', i + 60, 495);
            }
        }

        // 游戏循环
        function gameLoop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            drawBackground();

            if (gameRunning) {
                player1.update();
                player2.update();
            }

            player1.draw();
            player2.draw();

            updateParticles();
            updateProjectiles();

            requestAnimationFrame(gameLoop);
        }

        // 启动游戏
        gameLoop();
    </script>
</body>
</html>
