name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  verify:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Contract audit
        run: npm run -C apps/studio contract:audit

      - name: Typecheck
        run: npm run -C apps/studio typecheck

      - name: Tests
        run: npm run -C apps/studio test
